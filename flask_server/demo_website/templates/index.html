<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask App</title>
</head>
<body>
    <h1>{{ title }}</h1>
    <p>Welcome to the Flask app!</p>
    <label id="MyResult"></label>

    <div class="upload-section">
        <label for="imageUpload" class="upload-btn">Select Images</label>
        <input type="file" id="imageUpload" accept="image/*" multiple onchange="handleFileSelect(event)">
        <p class="hint">Supports JPG, PNG, GIF, and WebP.</p>
    </div>
    <div id="previewContainer" class="preview-container">
        <!-- Previews will be added here dynamically with JavaScript -->
    </div>
</body>
<script src="{{url_for('static', filename='index_script.js')}}">
</script>
</html>
