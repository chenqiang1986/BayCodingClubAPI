<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wearing Suggestion</title>
</head>
<body>
    <h1>Welcome</h1>
    <p>Please input your location and the number of days in the future for suggestions:</p>
    <label for="state_input">State:</label>
    <input type="text" id="state_input" name="state_input"><br><br>
    <label for="city_input">City:</label>
    <input type="text" id="city_input" name="city_input"><br><br>
    <label for="zip_code_input">Zip Code (optional):</label>
    <input type="text" id="zip_code_input" name="zip_code_input"><br><br>
    <label for="days_input">Days:</label>
    <input type="text" id="days_input" name="days_input"><br><br>
    <input type="button" id="submit_button" value="Submit">
    <div id="zip_code_display"></div>
    <div id="weather_display"></div>
    
</body>
<script src="/static/index_script.js">
</script>
</html>
